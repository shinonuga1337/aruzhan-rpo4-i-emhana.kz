<table class="table table-hover">
    <thead>
        <tr>
            <th>Пациент</th>
            <th>Врач</th>
            <th>Дата</th>
            <th>Статус</th>
        </tr>
    </thead>

    <tbody>
        {% for a in appointments %}
        <tr>
            <td>{{ a.patient.full_name }}</td>
            <td>{{ a.doctor }}</td>
            <td>{{ a.date_time }}</td>
            <td>{{ a.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
