{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Вход в систему
                    </h2>

                    <form method="post">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Войти
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
